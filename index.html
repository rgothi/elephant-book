<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elephant Book</title>

<style>
body {
    margin: 0;
    background: #f5e6c8;
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-family: Arial, sans-serif;
}
.viewer {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}
img {
    max-width: 95vw;
    max-height: calc(100vh - 90px);
    object-fit: contain;
}
.controls {
    height: 90px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: rgba(245,230,200,0.98);
}
button {
    padding: 16px 22px;
    font-weight: bold;
    font-size: 18px;
    border-radius: 12px;
    border: none;
}
</style>
</head>

<body>

<div class="viewer" id="viewer">
    <img id="page" src="page0.png">
</div>

<div class="controls">
    <button onclick="prevPage()">PREVIOUS</button>
    <button onclick="nextPage()">NEXT</button>
    <button onclick="stopAudio()">STOP</button>
</div>

<audio id="voice"></audio>
<audio id="music" loop></audio>

<script>
let currentPage = 0;
const totalPages = 26;
let started = false;
let currentMusicBase = 0.04;

function isMobile() {
    return window.innerWidth <= 768;
}

function showPage() {
    document.getElementById("page").src = "page" + currentPage + ".png";
    if (started && currentPage >= 3) playAudio();
}

function nextPage() {
    started = true;
    if (currentPage < totalPages - 1) {
        stopAudio();
        currentPage++;
        showPage();
    }
}

function prevPage() {
    if (currentPage > 0) {
        stopAudio();
        currentPage--;
        showPage();
    }
}

function stopAudio() {
    voice.pause(); voice.currentTime = 0;
    music.pause(); music.currentTime = 0;
}

function playAudio() {
    stopAudio();

    let pageNum = currentPage - 2;

    if (pageNum >= 1) {
        voice.src = "audio/page" + pageNum + ".mp3";
        voice.volume = 1.0;
        voice.play().catch(()=>{});
    }

    let musicFile = "audio/soft.mp3";

    // 🎯 IMPROVED BALANCE
    if (pageNum >= 19 && pageNum <= 22) {
        currentMusicBase = isMobile() ? 0.07 : 0.10;  // 🔥 increased clearly
        musicFile = "audio/wedding" + pageNum + ".mp3";
    } else {
        currentMusicBase = isMobile() ? 0.03 : 0.05;
    }

    music.src = musicFile;
    music.volume = currentMusicBase;
    music.play().catch(()=>{});
}

// 🔊 controlled ducking (not killing wedding music)
voice.addEventListener("play", () => {
    music.volume = currentMusicBase * 0.6;
});

voice.addEventListener("ended", () => {
    music.volume = currentMusicBase;
});

// swipe
let startX = 0;
viewer.addEventListener("touchstart", e => startX = e.touches[0].clientX);
viewer.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) nextPage();
    if (endX - startX > 50) prevPage();
});
</script>

</body>
</html>
