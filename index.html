<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elephant Ant Wedding Cartoon</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:100%;
    text-align:center;
}
img{
    max-width:100vw;
    max-height:80vh;
    object-fit:contain;
    border-radius:12px;
}
.controls{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}
button{
    background:#f5a623;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
#pageText{
    margin-top:8px;
    font-size:20px;
}

@media (max-width:768px){
    button{
        font-size:20px;
        padding:16px 20px;
        min-width:120px;
    }
}
</style>
</head>

<body>

<div class="container">
    <img id="pageImage" src="page0.png">
    <div id="pageText">Cover Page</div>

    <div class="controls">
        <button onclick="prevPage()">⬅ Previous</button>
        <button onclick="toggleAudio()">▶ Play / Pause</button>
        <button onclick="nextPage()">Next ➡</button>
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
</div>

<audio id="audio"></audio>

<script>

let currentPage = 0;

// total image pages INCLUDING intro pages
const maxImagePage = 26;

const image = document.getElementById("pageImage");
const audio = document.getElementById("audio");
const pageText = document.getElementById("pageText");

function updatePage(){

    image.src = `page${currentPage}.png`;

    // Silent intro pages
    if(currentPage === 0){
        pageText.innerText = "Cover Page";
        audio.pause();
        audio.removeAttribute("src");
    }
    else if(currentPage === 1){
        pageText.innerText = "Copyright Page";
        audio.pause();
        audio.removeAttribute("src");
    }
    else if(currentPage === 2){
        pageText.innerText = "Preface";
        audio.pause();
        audio.removeAttribute("src");
    }

    // Story starts from page3.png using page1.mp3
    else{

        const storyPage = currentPage - 2;

        pageText.innerText = `Page ${storyPage} / 25`;

        audio.pause();
        audio.src = `audio/page${storyPage}.mp3`;
        audio.load();

        audio.play().catch(()=>{});
    }
}

function nextPage(){
    if(currentPage < maxImagePage){
        currentPage++;
        updatePage();
    }
}

function prevPage(){
    if(currentPage > 0){
        currentPage--;
        updatePage();
    }
}

function toggleAudio(){

    if(!audio.src) return;

    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}

function toggleFullscreen(){

    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
}

// Swipe support

let startX = 0;

window.addEventListener("touchstart", e=>{
    startX = e.changedTouches[0].screenX;
});

window.addEventListener("touchend", e=>{

    let endX = e.changedTouches[0].screenX;

    if(endX - startX > 50){
        prevPage();
    }

    if(startX - endX > 50){
        nextPage();
    }
});

// Auto next page after narration
audio.addEventListener("ended", ()=>{
    nextPage();
});

updatePage();

</script>

</body>
</html>
