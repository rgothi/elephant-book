<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elephant Book</title>

<style>
body {
    margin:0;
    background:#f5e6c8;
    display:flex;
    flex-direction:column;
    height:100vh;
    font-family:Arial;
}
.viewer{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}
img{
    max-width:95vw;
    max-height:calc(100vh - 90px);
    object-fit:contain;
}
.controls{
    height:90px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    background:#f5e6c8;
}
button{
    padding:16px 22px;
    font-size:18px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="viewer">
<img id="page" src="page0.png">
</div>

<div class="controls">
<button onclick="prevPage()">PREVIOUS</button>
<button onclick="nextPage()">NEXT</button>
<button onclick="stopAll()">STOP</button>
</div>

<audio id="voice"></audio>
<audio id="music" loop></audio>

<script>

let currentPage=0;
const totalPages=26;
let started=false;

function showPage(){
document.getElementById("page").src="page"+currentPage+".png";
if(started && currentPage>=3) playAudio();
}

function nextPage(){
started=true;
if(currentPage<totalPages-1){
stopAll();
currentPage++;
showPage();
}
}

function prevPage(){
if(currentPage>0){
stopAll();
currentPage--;
showPage();
}
}

function stopAll(){
voice.pause(); voice.currentTime=0;
music.pause(); music.currentTime=0;
}

function playAudio(){

stopAll();

let pageNum=currentPage-2;

// 🎯 FINAL RELIABLE SOLUTION: PAUSE MUSIC DURING NARRATION

if(pageNum>=1){

voice.src="audio/page"+pageNum+".mp3";
voice.volume=1.0;
voice.play().catch(()=>{});

voice.onplay = () => {
music.pause();
};

voice.onended = () => {
startMusic(pageNum);
};

} else {
startMusic(pageNum);
}

}

function startMusic(pageNum){

let musicFile="audio/soft.mp3";
let volume=0.04;

if(pageNum>=19 && pageNum<=22){
musicFile="audio/wedding"+pageNum+".mp3";
volume=0.06;
}

music.src=musicFile;
music.volume=volume;
music.play().catch(()=>{});

}

// swipe
let startX=0;
document.querySelector(".viewer").addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.querySelector(".viewer").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50) nextPage();
if(endX-startX>50) prevPage();
});

</script>

</body>
</html>
